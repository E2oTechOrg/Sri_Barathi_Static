<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog Detail</title>

<link rel="stylesheet" href="string.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  background: #f7f9fc;
  margin: 0;
}

/* 🔙 Back Button */
.back-btn {
  display: inline-block;
  margin: 40px 30px;
  padding: 10px 18px;
  background: #0b3c5d; /* Dark Blue */
  border-radius: 25px;
  text-decoration: none;
  color: #fff;
  font-size: 14px;
  transition: all 0.3s ease;
}

/* Hover Effect */
.back-btn:hover {
  background: #06283d; /* Darker blue */
  transform: translateY(-2px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

/* 🧾 Header Section */
.blog-header {
  text-align: center;
  padding: 20px 20px 10px;
}

.blog-title {
  font-size: 42px;
  font-weight: 700;
  color: #1e2a38;
  max-width: 900px;
  margin: auto;
  line-height: 1.3;
}

/* 🖼️ Hero Image */
.blog-hero {
  width: 90%;
  max-width: 1000px;
  margin: 30px auto;
}

.blog-hero img {
  width: 100%;
  border-radius: 15px;
}

/* 📄 Content */
.blog-content {
  width: 100%;
  max-width: 1000px;
  margin: auto;
  font-size: 18px;
  line-height: 1.8;
  color: #333;
}

/* Clean content styling */
.blog-content h1,
.blog-content h2,
.blog-content h3 {
  margin-top: 20px;
}

.blog-content img {
  max-width: 100%;
  border-radius: 10px;
  margin: 20px 0;
}

/* Responsive */
@media (max-width: 768px) {
  .blog-title {
    font-size: 28px;
  }

  .blog-content {
    font-size: 16px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="header-container"></div>

<!-- Back -->
<a href="index.html#blogSection" class="back-btn">← Back to Blogs</a>
<div id="loader" class="loader"></div>
<!-- Blog Header -->
<div class="blog-header">
  <h1 id="blogTitle" class="blog-title"></h1>
</div>

<!-- Hero Image -->
<div class="blog-hero">
  <img id="blogImage">
</div>

<!-- Content -->
<div id="blogContent" class="blog-content"></div>

<!-- FOOTER -->
<div id="footer-container"></div>

<script src="api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const blogId = parseInt(params.get("id"));

async function loadBlog() {

  const loader = document.getElementById("loader");
  const content = document.getElementById("blogContent");

  loader.style.display = "block";
  content.innerHTML = "";

  try {
    const result = await getBlogs(1, 1, 50);

    if (!result.data) {
      content.innerHTML = "<p>No data</p>";
      return;
    }

    const blog = result.data.find(b => b.blogId === blogId);

    if (!blog) {
      content.innerHTML = "<p>Blog not found</p>";
      return;
    }

    document.getElementById("blogTitle").innerText = blog.blogTitle;
    document.getElementById("blogImage").src = blog.blogImage;

    const parser = new DOMParser();
    const doc = parser.parseFromString(blog.blogContent, "text/html");

    const cleanHTML = DOMPurify.sanitize(doc.body.innerHTML);

    content.innerHTML = cleanHTML;

  } catch (err) {
    content.innerHTML = "<p>Error loading blog</p>";
  } finally {
    
    loader.style.display = "none";
  }
}

document.addEventListener("DOMContentLoaded", loadBlog);
</script>

<script src="script.js"></script>

</body>
</html>

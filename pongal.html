<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pongal celebration - Sri Bharathi Vidyalaya</title>

<!-- TAB LOGO -->
<link rel="icon" type="image/png" href="aset/logo.png">
<link rel="stylesheet" href="string.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />


<style>
*{box-sizing:border-box;margin:0;font-family:system-ui,sans-serif}
body{
  background:#f4f6f8;
  color:#222;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-top: 150px;
}

/* HEADER */
header{
  position:sticky;top:0;
  z-index:10;
  background:#0b3c5d;color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}


/* TITLE */
.title{
  text-align:center;
  padding:18px 10px;
}


.gallery-container{
  column-count: 5; /* number of columns */
  column-gap: 15px;
  padding:20px;
}

.gallery-item{
  position: relative;
  margin-bottom:15px;
  break-inside: avoid; 
  border-radius:12px;
  overflow:hidden;
}

.gallery-item img{
  width:100%;
  height:auto;
  object-fit:contain; 
  background:#eee;
  display:block;
  transition:0.4s;
}

.gallery-item span{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:8px;
  color:#fff;
  font-size:14px;
 
}

.gallery-item:hover img{
  transform:scale(1.08);
}
@media(max-width:900px){
  .gallery-container{
    column-count:2;
  }
}

@media(max-width:500px){
  .gallery-container{
    column-count:1;
  }
}
.image-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.modal-content {
  max-width: 80vw;     /* ✅ reduce width */
  max-height: 80vh;    /* ✅ control height */
  width: auto;
  height: auto;
  object-fit: contain; /* ✅ prevents stretching */
  border-radius: 12px;
  background: transparent;
  padding: 6px;   
}

.close-modal{
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}

.gallery-item img{
  cursor:pointer;
}

/* FOOTER */
footer{
  background:#0b3c5d;
  color:#fff;
  text-align:center;
  padding:12px;
  font-size:14px;
  margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
  .brand span{display:none}
}
</style>
</head>

<body>
<!-- HEADER -->
<div id="header-container"></div>


<div class="gallery-container" id="gallery">

</div>
<div id="imageModal" class="image-modal">
  <span class="close-modal">&times;</span>
  <img id="modalImg" class="modal-content">
</div>

<!-- FOOTER -->
<div id="footer-container"></div>
<script src="api.js"></script>
 <script src="script.js"></script> 
<script>
const galleryImages = [
  {url: "aset/pongal/pongal.jpg", title: ""},

  {url: "aset/pongal/pongal1.jpg", title: ""},
  
  // add more images here...
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");

let currentpex = 0;
const batchSize = 10;

// create Load More button
// create Load More button
const loadMoreBtn = document.createElement("button");
loadMoreBtn.innerText = "Load More...";
loadMoreBtn.style.cssText = `
  display:block;
  margin:20px auto;
  padding:10px 20px;
  border:none;
  background:#0b3c5d;
  color:white;
  border-radius:8px;
  cursor:pointer;
`;

// ✅ insert BEFORE footer
const footer = document.getElementById("footer-container");
footer.parentNode.insertBefore(loadMoreBtn, footer);

// function to load images
function loadImages() {
  const nextBatch = galleryImages.slice(currentpex, currentpex + batchSize);

  nextBatch.forEach(img => {
    const div = document.createElement("div");
    div.className = "gallery-item";

    div.innerHTML = `
      <img src="${img.url}" alt="" loading="lazy">
      <span>${img.title}</span>
    `;

    const image = div.querySelector("img");

    image.addEventListener("click", () => {
      modal.style.display = "flex";
      modalImg.src = img.url;
    });

    gallery.appendChild(div);
  });

  currentpex += batchSize;

  // hide button if all images loaded
  if (currentpex >= galleryImages.length) {
    loadMoreBtn.style.display = "none";
  }
}

// initial load (first 10)
loadImages();

// button click load next 10
loadMoreBtn.addEventListener("click", loadImages);

// modal close
document.querySelector(".close-modal").onclick = () => {
  modal.style.display = "none";
};

modal.onclick = (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
};
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Documentation - Sri Bharathi Vidyalaya</title>

<!-- TAB LOGO -->
<link rel="icon" type="image/png" href="aset/logo.png">
<link rel="stylesheet" href="string.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />


<style>
*{box-sizing:border-box;margin:0;font-family:system-ui,sans-serif}
body{
  background:#f4f6f8;
  color:#222;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-top: 150px;
}

/* HEADER */
header{
  position:sticky;top:0;z-index:10;
  background:#0b3c5d;color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}


/* TITLE */
.title{
  text-align:center;
  padding:18px 10px;
}


.gallery-container{
  column-count: 3; /* number of columns */
  column-gap: 15px;
  padding:20px;
}

.gallery-item{
  position: relative;
  margin-bottom:15px;
  break-inside: avoid; 
  border-radius:12px;
  overflow:hidden;
}

.gallery-item img{
  width:100%;
  height:auto;
  object-fit:contain; 
  background:#eee;
  display:block;
  transition:0.4s;
}

.gallery-item span{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:8px;
  color:#fff;
  font-size:14px;
 
}

.gallery-item:hover img{
  transform:scale(1.08);
}
@media(max-width:900px){
  .gallery-container{
    column-count:2;
  }
}

@media(max-width:500px){
  .gallery-container{
    column-count:1;
  }
}
.image-modal{
  display:none;
  position:fixed;
  z-index:9999;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.modal-content{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

.close-modal{
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}

.gallery-item img{
  cursor:pointer;
}

/* FOOTER */
footer{
  background:#0b3c5d;
  color:#fff;
  text-align:center;
  padding:12px;
  font-size:14px;
  margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
  .brand span{display:none}
}
</style>
</head>

<body>
<!-- ANNOUNCEMENT BAR -->
<!-- ANNOUNCEMENT BAR -->
<div id="announce-container"></div>

<!-- HEADER -->
<div id="header-container"></div>

<div id="overlay"></div>
<div id="sidebar">

  <div class="sidebar-header">
    <img src="aset/logo.png" class="sidebar-logo" />
    <span class="close-btn" id="closeSidebar">✖</span>
  </div>

  <a href="index.html">🏠 Home</a>
  <div class="sidebar-dropdown">
    <a href="profile.html" class="sidebar-drop-link" onclick="toggleSidebarDropdown()">
      ℹ️ About Us <i class="fas fa-chevron-down"></i>
    </a>
  
    <div class="sidebar-dropdown-content" id="sidebarDropdown">
      <a href="Foundation.html">Foundation</a>
      <a href="Vision.html">Vision & Mission</a>
    </div>
  </div>

  <a href="gallery.html">🖼️ Gallery</a>

<div class="sidebar-dropdown">

  <div class="sidebar-drop-link">
    <a href="#">ℹ️ Events</a>
    <i class="fas fa-chevron-down" onclick="toggleDropdown(this)"></i>
  </div>

  <div class="sidebar-dropdown-content">
    <a href="Event.html">Recent Events</a>
    
  </div></div>

  <a href="magazine.html">📘 Magazine</a>
  <a href="contact.html">📞 Contact</a>
  <a href="login.html" class="login-btn">Login</a>

</div>

<div class="gallery-container" id="gallery">

</div>
<div id="imageModal" class="image-modal">
  <span class="close-modal">&times;</span>
  <img id="modalImg" class="modal-content">
</div>

<!-- FOOTER -->
<div id="footer-container"></div>
 <script src="script.js"></script> 
<script>
const galleryImages = [
  {url: "aset/fotber1.jpeg", title: ""},
  {url: "aset/fotber2.jpeg", title: ""},
  {url: "aset/fotber3.jpg", title: ""},
  {url: "aset/fotber4.jpeg", title: ""},
  {url: "aset/logo.png", title: ""},
  {url: "aset/secondary.jpg", title: ""},
  {url: "aset/ida.jpg", title: ""},
  {url: "aset/primary-1.jpg", title: ""},
   {url: "aset/gal2.jpg", title: ""},
];

const gallery = document.getElementById("gallery");
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");

galleryImages.forEach(img => {
  const div = document.createElement("div");
  div.className = "gallery-item";

  div.innerHTML = `
    <img src="${img.url}" alt="" loading="lazy">
    <span>${img.title}</span>
  `;

  const image = div.querySelector("img");

  image.addEventListener("click", () => {
    modal.style.display = "flex";
    modalImg.src = img.url;
  });

  gallery.appendChild(div);
});

document.querySelector(".close-modal").onclick = () => {
  modal.style.display = "none";
};

modal.onclick = (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
};
</script>
</body>
</html>

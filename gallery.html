<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Documentation - Sri Bharathi Vidyalaya</title>

<!-- TAB LOGO -->
<link rel="icon" type="image/png" href="aset/logo.png">
<link rel="stylesheet" href="string.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

<style>
*{box-sizing:border-box;margin:0;font-family:system-ui,sans-serif}
body{
  background:#f4f6f8;
  color:#222;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-top: 150px;
}

/* HEADER */
header{
  position:sticky;top:0;z-index:10;
  background:#0b3c5d;color:#fff;
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}


/* TITLE */
.title{
  text-align:center;
  padding:18px 10px;
}


.gallery-container{
  column-count: 5; /* number of columns */
  column-gap: 15px;
  padding:20px;
}

.gallery-item{
  position: relative;
  margin-bottom:15px;
  break-inside: avoid; 
  border-radius:12px;
  overflow:hidden;
}

.gallery-item img{
  width:100%;
  height:auto;
  object-fit:contain; 
  background:#eee;
  display:block;
  transition:0.4s;
}

.gallery-item span{
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  padding:8px;
  color:#fff;
  font-size:14px;
 
}

.gallery-item:hover img{
  transform:scale(1.08);
}
@media(max-width:900px){
  .gallery-container{
    column-count:2;
  }
}

@media(max-width:500px){
  .gallery-container{
    column-count:1;
  }
}
.image-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.modal-content {
  max-width: 80vw;     /* ✅ reduce width */
  max-height: 80vh;    /* ✅ control height */
  width: auto;
  height: auto;
  object-fit: contain; /* ✅ prevents stretching */
  border-radius: 12px;
  background: transparent;
  padding: 6px;   
}

.close-modal{
  position:absolute;
  top:20px;
  right:30px;
  font-size:40px;
  color:#fff;
  cursor:pointer;
}
/* Nav buttons */
.nav-btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:40px;
  color:#fff;
  cursor:pointer;
  padding:10px;
  z-index:10000;
}

.prev{ left:20px; }
.next{ right:20px; }

.nav-btn:hover{
  color:#f0c040;
}

/* Counter */
.image-counter{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  color:#fff;
  background:rgba(0,0,0,0.6);
  padding:6px 12px;
  border-radius:20px;
  font-size:14px;
  z-index:10000;
}

.gallery-item img{
  cursor:pointer;
}

/* FOOTER */
footer{
  background:#0b3c5d;
  color:#fff;
  text-align:center;
  padding:12px;
  font-size:14px;
  margin-top:auto;
}

/* MOBILE */
@media(max-width:480px){
  .brand span{display:none}
}
</style>
</head>

<body>
<!-- HEADER -->
<div id="header-container"></div>

<div class="gallery-container" id="gallery">

</div>
<div id="imageModal" class="image-modal">
  <span class="close-modal">&times;</span>

  <span id="prevBtn" class="nav-btn prev">&#10094;</span>

  <img id="modalImg" class="modal-content">

  <span id="nextBtn" class="nav-btn next">&#10095;</span>

  <div id="imageCounter" class="image-counter">1 / 1</div>
</div>

<!-- FOOTER -->
<div id="footer-container"></div>
<script src="api.js"></script>
<script src="script.js"></script> 
<script>
const gallery = document.getElementById("gallery");
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");
const closeModal = document.querySelector(".close-modal");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const counter = document.getElementById("imageCounter");

let galleryImages = [];
let currentIndex = 0;
let modalIndex = 0;
const batchSize = 10;

// Convert API data
function mapImages(data) {
  return data.map(img => ({
    url: img.image_Url,
    title: img.image_Caption || ""
  }));
}

// Get all DOM images
function getAllImages() {
  return document.querySelectorAll(".gallery-item img");
}

function updateCounter() {
  const images = getAllImages();
  counter.textContent = `${modalIndex + 1} / ${images.length}`;
}

function openModal(index) {
  const images = getAllImages();
  modal.style.display = "flex";
  modalImg.src = images[index].src;
  modalIndex = index;
  updateCounter();
}

//  Load images (lazy batch)
function loadImages() {
  const nextBatch = galleryImages.slice(currentIndex, currentIndex + batchSize);

  nextBatch.forEach((img) => {
    const div = document.createElement("div");
    div.className = "gallery-item";

    div.innerHTML = `
      <img src="${img.url}" loading="lazy">
    `;

    const image = div.querySelector("img");

    image.addEventListener("click", () => {
      const allImages = getAllImages();
      const index = Array.from(allImages).indexOf(image);
      openModal(index);
    });

    gallery.appendChild(div);
  });

  currentIndex += batchSize;

  if (currentIndex >= galleryImages.length) {
    loadMoreBtn.style.display = "none";
  }
}

// Fetch + Initialize
async function initGallery() {
  gallery.innerHTML = "<p style='text-align:center'>Loading...</p>";

  const data = await getGalleryImages(1);

  gallery.innerHTML = "";

  galleryImages = mapImages(data);

  loadImages();
}

const loadMoreBtn = document.createElement("button");
loadMoreBtn.innerText = "Load More...";
loadMoreBtn.style.cssText = `
  display:block;
  margin:20px auto;
  padding:10px 20px;
  border:none;
  background:#0b3c5d;
  color:white;
  border-radius:8px;
  cursor:pointer;
`;

const footer = document.getElementById("footer-container");
footer.parentNode.insertBefore(loadMoreBtn, footer);

loadMoreBtn.addEventListener("click", loadImages);

nextBtn.onclick = (e) => {
  e.stopPropagation();
  const images = getAllImages();
  modalIndex = (modalIndex + 1) % images.length;
  modalImg.src = images[modalIndex].src;
  updateCounter();
};

prevBtn.onclick = (e) => {
  e.stopPropagation();
  const images = getAllImages();
  modalIndex = (modalIndex - 1 + images.length) % images.length;
  modalImg.src = images[modalIndex].src;
  updateCounter();
};

closeModal.onclick = () => modal.style.display = "none";

modal.onclick = (e) => {
  if (e.target === modal) modal.style.display = "none";
};

document.addEventListener("keydown", (e) => {
  if (modal.style.display === "flex") {
    if (e.key === "ArrowRight") nextBtn.click();
    if (e.key === "ArrowLeft") prevBtn.click();
    if (e.key === "Escape") modal.style.display = "none";
  }
});

initGallery();

</script>
</body>
</html>
